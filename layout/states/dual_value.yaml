<<: !include
  file: ../grid/cell.yaml
  vars:
    x: ${x}
    y: ${y}
    pad_all: ${GRID_PADDING}
layout:
  <<: !include ../grid/layout.yaml
  grid_rows: [FR(1), FR(1), FR(1)]
  grid_columns: [FR(1), FR(1)]
  multiple_widgets_per_cell: true
widgets:
  - label:
      <<: !include
        file: ../grid/label_cell.yaml
        vars:
          x: 0
          y: 0
          colspan: 2
          x_align: START
          text: ${state_title}
          font_size: "sm"
  - label:
      <<: !include
        file: ../grid/label_cell.yaml
        vars:
          x: 0
          y: 1
          x_align: START
          text: ${top_label}
          font_size: "sm"
  - label:
      <<: !include
        file: ../grid/label_cell.yaml
        vars:
          x: 1
          y: 1
          x_align: END
          font_size: "sm"
      id: "state_${top_id}"
  - label:
      <<: !include
        file: ../grid/label_cell.yaml
        vars:
          x: 0
          y: 2
          x_align: START
          text: ${bottom_label}
          font_size: "sm"
  - label:
      <<: !include
        file: ../grid/label_cell.yaml
        vars:
          x: 1
          y: 2
          x_align: END
          font_size: "sm"
      id: "state_${bottom_id}"
